openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: SiteSort API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: projects
    description: Project management
  - name: documents
    description: Document management
  - name: distributions
    description: Document distributions
  - name: audit
    description: Immutable acknowledgment audit trail
  - name: team
    description: Team management
  - name: subcontractors
    description: Subcontractor management
  - name: insurance
    description: Insurance records
  - name: permits
    description: Permit management
  - name: photos
    description: Photo compliance log
  - name: compliance
    description: Compliance overview
  - name: notifications
    description: Notification management
  - name: users
    description: User management
  - name: qr
    description: QR code generation
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new company and admin user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Registered successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout current user
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List all projects for the company
      responses:
        "200":
          description: List of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
    post:
      operationId: createProject
      tags: [projects]
      summary: Create a new project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectRequest"
      responses:
        "201":
          description: Project created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  /projects/{projectId}:
    get:
      operationId: getProject
      tags: [projects]
      summary: Get a project by ID
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Project details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateProject
      tags: [projects]
      summary: Update a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectRequest"
      responses:
        "200":
          description: Updated project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  /projects/{projectId}/documents:
    get:
      operationId: listDocuments
      tags: [documents]
      summary: List documents for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Document"
    post:
      operationId: uploadDocument
      tags: [documents]
      summary: Upload a new document to a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadDocumentRequest"
      responses:
        "201":
          description: Document uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"

  /documents/{documentId}:
    get:
      operationId: getDocument
      tags: [documents]
      summary: Get a document by ID
      parameters:
        - name: documentId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Document details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /documents/{documentId}/acknowledge:
    post:
      operationId: acknowledgeDocument
      tags: [documents]
      summary: Acknowledge a document (sign-off)
      parameters:
        - name: documentId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AcknowledgeRequest"
      responses:
        "200":
          description: Acknowledgment recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /documents/{documentId}/distribute:
    post:
      operationId: distributeDocument
      tags: [distributions]
      summary: Distribute a document to team members
      parameters:
        - name: documentId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DistributeRequest"
      responses:
        "200":
          description: Distribution created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /documents/{documentId}/distributions:
    get:
      operationId: getDocumentDistributions
      tags: [distributions]
      summary: Get distribution status for a document
      parameters:
        - name: documentId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Distribution records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Distribution"

  /documents/{documentId}/audit-log:
    get:
      operationId: getDocumentAuditLog
      tags: [audit]
      summary: Get the immutable acknowledgment audit trail for a document
      description: Read-only, append-only history of sign-offs. Restricted to admins and project managers.
      parameters:
        - name: documentId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Audit trail entries (newest first)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AuditLogEntry"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /projects/{projectId}/members:
    get:
      operationId: listProjectMembers
      tags: [team]
      summary: List members of a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProjectMember"
    post:
      operationId: addProjectMember
      tags: [team]
      summary: Add a member to a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddMemberRequest"
      responses:
        "201":
          description: Member added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectMember"

  /projects/{projectId}/members/{memberId}:
    delete:
      operationId: removeProjectMember
      tags: [team]
      summary: Remove a member from a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - name: memberId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Member removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /subcontractors:
    get:
      operationId: listSubcontractors
      tags: [subcontractors]
      summary: List all subcontractors for the company
      responses:
        "200":
          description: List of subcontractors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Subcontractor"
    post:
      operationId: createSubcontractor
      tags: [subcontractors]
      summary: Add a new subcontractor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSubcontractorRequest"
      responses:
        "201":
          description: Subcontractor created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subcontractor"

  /subcontractors/{subcontractorId}:
    get:
      operationId: getSubcontractor
      tags: [subcontractors]
      summary: Get a subcontractor by ID
      parameters:
        - name: subcontractorId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Subcontractor details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubcontractorDetail"
    patch:
      operationId: updateSubcontractor
      tags: [subcontractors]
      summary: Update a subcontractor
      parameters:
        - name: subcontractorId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSubcontractorRequest"
      responses:
        "200":
          description: Updated subcontractor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subcontractor"

  /subcontractors/{subcontractorId}/insurance:
    post:
      operationId: addInsuranceRecord
      tags: [insurance]
      summary: Add an insurance record for a subcontractor
      parameters:
        - name: subcontractorId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddInsuranceRequest"
      responses:
        "201":
          description: Insurance record added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InsuranceRecord"

  /projects/{projectId}/permits:
    get:
      operationId: listPermits
      tags: [permits]
      summary: List permits for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of permits
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Permit"
    post:
      operationId: createPermit
      tags: [permits]
      summary: Create a new permit
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePermitRequest"
      responses:
        "201":
          description: Permit created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Permit"

  /permits/{permitId}:
    patch:
      operationId: updatePermit
      tags: [permits]
      summary: Update a permit
      parameters:
        - name: permitId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePermitRequest"
      responses:
        "200":
          description: Updated permit
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Permit"

  /projects/{projectId}/photos:
    get:
      operationId: listPhotos
      tags: [photos]
      summary: List photos for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of photos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Photo"
    post:
      operationId: logPhoto
      tags: [photos]
      summary: Log a compliance photo
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LogPhotoRequest"
      responses:
        "201":
          description: Photo logged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Photo"

  /compliance:
    get:
      operationId: getComplianceOverview
      tags: [compliance]
      summary: Get compliance overview (expiring insurance, permits, pending acknowledgments)
      responses:
        "200":
          description: Compliance overview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComplianceOverview"

  /notifications:
    get:
      operationId: listNotifications
      tags: [notifications]
      summary: List notifications for the current user
      responses:
        "200":
          description: List of notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notification"

  /notifications/{notificationId}/read:
    patch:
      operationId: markNotificationRead
      tags: [notifications]
      summary: Mark a notification as read
      parameters:
        - name: notificationId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Notification marked read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /notifications/read-all:
    patch:
      operationId: markAllNotificationsRead
      tags: [notifications]
      summary: Mark all notifications as read
      responses:
        "200":
          description: All notifications marked read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all users in the company
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      operationId: inviteUser
      tags: [users]
      summary: Invite a new user to the company
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InviteUserRequest"
      responses:
        "201":
          description: User invited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{userId}:
    patch:
      operationId: updateUser
      tags: [users]
      summary: Update a user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /projects/{projectId}/qr-codes:
    post:
      operationId: generateQrCodes
      tags: [qr]
      summary: Generate QR codes for a project's site board
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateQrRequest"
      responses:
        "200":
          description: QR codes generated
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/QrCode"

  /qr/{token}:
    get:
      operationId: getQrContent
      tags: [qr]
      summary: Get documents accessible via a QR code (public or authenticated)
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: QR code content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QrContent"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required: [success]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required: [error, message]

    RegisterRequest:
      type: object
      properties:
        companyName:
          type: string
        adminName:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
        companySize:
          type: string
          enum: [1-10, 11-50, 51-200, 201+]
      required: [companyName, adminName, email, password, companySize]

    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required: [email, password]

    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string
      required: [user, token]

    User:
      type: object
      properties:
        id:
          type: string
        companyId:
          type: string
        email:
          type: string
        name:
          type: string
        role:
          type: string
          enum: [admin, project_manager, site_worker, subcontractor]
        phone:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        lastActiveAt:
          type: string
          format: date-time
          nullable: true
        avatarUrl:
          type: string
          nullable: true
        hasPin:
          type: boolean
      required: [id, companyId, email, name, role, createdAt]

    InviteUserRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        name:
          type: string
        role:
          type: string
          enum: [admin, project_manager, site_worker, subcontractor]
        phone:
          type: string
      required: [email, name, role]

    UpdateUserRequest:
      type: object
      properties:
        name:
          type: string
        role:
          type: string
          enum: [admin, project_manager, site_worker, subcontractor]
        phone:
          type: string

    Project:
      type: object
      properties:
        id:
          type: string
        companyId:
          type: string
        name:
          type: string
        address:
          type: string
        status:
          type: string
          enum: [active, on_hold, complete]
        startDate:
          type: string
          format: date
        targetEndDate:
          type: string
          format: date
          nullable: true
        createdAt:
          type: string
          format: date-time
        memberCount:
          type: integer
        alertCount:
          type: integer
        progressPercent:
          type: integer
      required: [id, companyId, name, address, status, startDate, createdAt, memberCount, alertCount, progressPercent]

    ProjectDetail:
      allOf:
        - $ref: "#/components/schemas/Project"
        - type: object
          properties:
            recentActivity:
              type: array
              items:
                $ref: "#/components/schemas/ActivityItem"
          required: [recentActivity]

    CreateProjectRequest:
      type: object
      properties:
        name:
          type: string
        address:
          type: string
        startDate:
          type: string
          format: date
        targetEndDate:
          type: string
          format: date
      required: [name, address, startDate]

    UpdateProjectRequest:
      type: object
      properties:
        name:
          type: string
        address:
          type: string
        status:
          type: string
          enum: [active, on_hold, complete]
        targetEndDate:
          type: string
          format: date

    ActivityItem:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
        description:
          type: string
        userId:
          type: string
          nullable: true
        userName:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, type, description, createdAt]

    Document:
      type: object
      properties:
        id:
          type: string
        projectId:
          type: string
        uploadedBy:
          type: string
        uploaderName:
          type: string
        name:
          type: string
        type:
          type: string
          enum: [drawing, method_statement, permit, safety, general]
        version:
          type: integer
        fileUrl:
          type: string
        fileSize:
          type: integer
        previousVersionId:
          type: string
          nullable: true
        status:
          type: string
          enum: [current, superseded]
        requiresAcknowledgment:
          type: boolean
        publicAccess:
          type: boolean
        createdAt:
          type: string
          format: date-time
        distributionSummary:
          $ref: "#/components/schemas/DistributionSummary"
        myDistributionStatus:
          type: string
          enum: [pending, viewed, acknowledged]
          nullable: true
      required: [id, projectId, uploadedBy, uploaderName, name, type, version, fileUrl, fileSize, status, requiresAcknowledgment, publicAccess, createdAt, distributionSummary]

    DocumentDetail:
      allOf:
        - $ref: "#/components/schemas/Document"
        - type: object
          properties:
            distributions:
              type: array
              items:
                $ref: "#/components/schemas/Distribution"
          required: [distributions]

    DistributionSummary:
      type: object
      properties:
        total:
          type: integer
        pending:
          type: integer
        viewed:
          type: integer
        acknowledged:
          type: integer
      required: [total, pending, viewed, acknowledged]

    UploadDocumentRequest:
      type: object
      properties:
        name:
          type: string
        type:
          type: string
          enum: [drawing, method_statement, permit, safety, general]
        fileUrl:
          type: string
        fileSize:
          type: integer
        requiresAcknowledgment:
          type: boolean
        publicAccess:
          type: boolean
        distributeToUserIds:
          type: array
          items:
            type: string
      required: [name, type, fileUrl, fileSize]

    AcknowledgeRequest:
      type: object
      properties:
        pin:
          type: string
          nullable: true
        latitude:
          type: number
          nullable: true
        longitude:
          type: number
          nullable: true
      required: []

    DistributeRequest:
      type: object
      properties:
        userIds:
          type: array
          items:
            type: string
      required: [userIds]

    Distribution:
      type: object
      properties:
        id:
          type: string
        documentId:
          type: string
        userId:
          type: string
