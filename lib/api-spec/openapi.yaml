openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: SiteSort API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: projects
    description: Project management
  - name: documents
    description: Document management
  - name: distributions
    description: Document distributions
  - name: audit
    description: Immutable acknowledgment audit trail
  - name: team
    description: Team management
  - name: subcontractors
    description: Subcontractor management
  - name: insurance
    description: Insurance records
  - name: permits
    description: Permit management
  - name: photos
    description: Photo compliance log
  - name: compliance
    description: Compliance overview
  - name: notifications
    description: Notification management
  - name: users
    description: User management
  - name: qr
    description: QR code generation
  - name: portal
    description: Team Portal — member onboarding, sections, and PM activity
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new company and admin user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Registered — verification email sent, no session issued yet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout current user
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List all projects for the company
      responses:
        "200":
          description: List of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
    post:
      operationId: createProject
      tags: [projects]
      summary: Create a new project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectRequest"
      responses:
        "201":
          description: Project created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  /projects/{projectId}:
    get:
      operationId: getProject
      tags: [projects]
      summary: Get a project by ID
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Project details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateProject
      tags: [projects]
      summary: Update a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectRequest"
      responses:
        "200":
          description: Updated project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  /projects/{projectId}/documents:
    get:
      operationId: listDocuments
      tags: [documents]
      summary: List documents for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Document"
    post:
      operationId: uploadDocument
      tags: [documents]
      summary: Upload a new document to a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadDocumentRequest"
      responses:
        "201":
          description: Document uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"

  /documents/{documentId}:
    get:
      operationId: getDocument
      tags: [documents]
      summary: Get a document by ID
      parameters:
        - name: documentId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Document details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /documents/{documentId}/acknowledge:
    post:
      operationId: acknowledgeDocument
      tags: [documents]
      summary: Acknowledge a document (sign-off)
      parameters:
        - name: documentId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AcknowledgeRequest"
      responses:
        "200":
          description: Acknowledgment recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /documents/{documentId}/distribute:
    post:
      operationId: distributeDocument
      tags: [distributions]
      summary: Distribute a document to team members
      parameters:
        - name: documentId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DistributeRequest"
      responses:
        "200":
          description: Distribution created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /documents/{documentId}/distributions:
    get:
      operationId: getDocumentDistributions
      tags: [distributions]
      summary: Get distribution status for a document
      parameters:
        - name: documentId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Distribution records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Distribution"

  /documents/{documentId}/audit-log:
    get:
      operationId: getDocumentAuditLog
      tags: [audit]
      summary: Get the immutable acknowledgment audit trail for a document
      description: Read-only, append-only history of sign-offs. Restricted to admins and project managers.
      parameters:
        - name: documentId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Audit trail entries (newest first)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AuditLogEntry"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /projects/{projectId}/members:
    get:
      operationId: listProjectMembers
      tags: [team]
      summary: List members of a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProjectMember"
    post:
      operationId: addProjectMember
      tags: [team]
      summary: Add a member to a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddMemberRequest"
      responses:
        "201":
          description: Member added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectMember"

  /projects/{projectId}/members/{memberId}:
    delete:
      operationId: removeProjectMember
      tags: [team]
      summary: Remove a member from a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - name: memberId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Member removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /subcontractors:
    get:
      operationId: listSubcontractors
      tags: [subcontractors]
      summary: List all subcontractors for the company
      responses:
        "200":
          description: List of subcontractors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Subcontractor"
    post:
      operationId: createSubcontractor
      tags: [subcontractors]
      summary: Add a new subcontractor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSubcontractorRequest"
      responses:
        "201":
          description: Subcontractor created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subcontractor"

  /subcontractors/{subcontractorId}:
    get:
      operationId: getSubcontractor
      tags: [subcontractors]
      summary: Get a subcontractor by ID
      parameters:
        - name: subcontractorId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Subcontractor details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubcontractorDetail"
    patch:
      operationId: updateSubcontractor
      tags: [subcontractors]
      summary: Update a subcontractor
      parameters:
        - name: subcontractorId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSubcontractorRequest"
      responses:
        "200":
          description: Updated subcontractor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subcontractor"

  /subcontractors/{subcontractorId}/insurance:
    post:
      operationId: addInsuranceRecord
      tags: [insurance]
      summary: Add an insurance record for a subcontractor
      parameters:
        - name: subcontractorId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddInsuranceRequest"
      responses:
        "201":
          description: Insurance record added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InsuranceRecord"

  /subcontractors/{subcontractorId}/insurance/{recordId}:
    patch:
      operationId: updateInsuranceRecord
      tags: [insurance]
      summary: Update an insurance record (reassign, due date, expiry, certificate)
      parameters:
        - name: subcontractorId
          in: path
          required: true
          schema:
            type: string
        - name: recordId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateInsuranceRequest"
      responses:
        "200":
          description: Updated insurance record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InsuranceRecord"

  /projects/{projectId}/permits:
    get:
      operationId: listPermits
      tags: [permits]
      summary: List permits for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of permits
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Permit"
    post:
      operationId: createPermit
      tags: [permits]
      summary: Create a new permit
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePermitRequest"
      responses:
        "201":
          description: Permit created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Permit"

  /permits/{permitId}:
    patch:
      operationId: updatePermit
      tags: [permits]
      summary: Update a permit
      parameters:
        - name: permitId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePermitRequest"
      responses:
        "200":
          description: Updated permit
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Permit"

  /projects/{projectId}/photos:
    get:
      operationId: listPhotos
      tags: [photos]
      summary: List photos for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of photos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Photo"
    post:
      operationId: logPhoto
      tags: [photos]
      summary: Log a compliance photo
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LogPhotoRequest"
      responses:
        "201":
          description: Photo logged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Photo"

  /compliance:
    get:
      operationId: getComplianceOverview
      tags: [compliance]
      summary: Get compliance overview (expiring insurance, permits, pending acknowledgments)
      responses:
        "200":
          description: Compliance overview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComplianceOverview"

  /notifications:
    get:
      operationId: listNotifications
      tags: [notifications]
      summary: List notifications for the current user
      responses:
        "200":
          description: List of notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notification"

  /notifications/{notificationId}/read:
    patch:
      operationId: markNotificationRead
      tags: [notifications]
      summary: Mark a notification as read
      parameters:
        - name: notificationId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Notification marked read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /notifications/read-all:
    patch:
      operationId: markAllNotificationsRead
      tags: [notifications]
      summary: Mark all notifications as read
      responses:
        "200":
          description: All notifications marked read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all users in the company
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      operationId: inviteUser
      tags: [users]
      summary: Invite a new user to the company
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InviteUserRequest"
      responses:
        "201":
          description: User invited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{userId}:
    patch:
      operationId: updateUser
      tags: [users]
      summary: Update a user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /projects/{projectId}/qr-codes:
    post:
      operationId: generateQrCodes
      tags: [qr]
      summary: Generate QR codes for a project's site board
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateQrRequest"
      responses:
        "200":
          description: QR codes generated
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/QrCode"

  /qr/{token}:
    get:
      operationId: getQrContent
      tags: [qr]
      summary: Get documents accessible via a QR code (public or authenticated)
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: QR code content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QrContent"

  # ---- Team Portal: member onboarding + login (public) ----
  /portal/login:
    post:
      operationId: portalLogin
      tags: [portal]
      summary: Log a portal-only member into their project portal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PortalLoginRequest"
      responses:
        "200":
          description: Logged in, or a project choice is required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortalLoginResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /portal/invite/{token}:
    get:
      operationId: getPortalInvite
      tags: [portal]
      summary: Look up a pending invite by its single-use token
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Invite is valid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortalInviteInfo"
        "410":
          description: Invite expired or already used
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /portal/invite/{token}/accept:
    post:
      operationId: acceptPortalInvite
      tags: [portal]
      summary: Accept an invite, set a password, and enter the portal
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AcceptInviteRequest"
      responses:
        "200":
          description: Account ready, portal token issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortalLoginResponse"
        "409":
          description: Email already has a full account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ---- Team Portal: member-facing read-only sections (portal token) ----
  /portal/me:
    get:
      operationId: getPortalContext
      tags: [portal]
      summary: The signed-in member's project + allowed sections
      responses:
        "200":
          description: Portal context
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortalContext"

  /portal/overview:
    get:
      operationId: getPortalOverview
      tags: [portal]
      summary: Portal overview (summary stats + recent notes)
      responses:
        "200":
          description: Overview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortalOverview"

  /portal/progress:
    get:
      operationId: getPortalProgress
      tags: [portal]
      summary: Project progress + milestones
      responses:
        "200":
          description: Progress
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortalProgress"

  /portal/team:
    get:
      operationId: getPortalTeam
      tags: [portal]
      summary: Project team members (read-only)
      responses:
        "200":
          description: Team members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PortalTeamMember"

  /portal/site-issues:
    get:
      operationId: getPortalSiteIssues
      tags: [portal]
      summary: Site issues (snags + safety concerns)
      responses:
        "200":
          description: Issues
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PortalIssue"

  /portal/site-board:
    get:
      operationId: getPortalSiteBoard
      tags: [portal]
      summary: Pinned site-board items + upcoming events
      responses:
        "200":
          description: Site board
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortalSiteBoard"

  /portal/hs:
    get:
      operationId: getPortalHs
      tags: [portal]
      summary: Health & Safety hub (method statements + safety docs + permits)
      responses:
        "200":
          description: H&S
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortalHs"

  /portal/drawings:
    get:
      operationId: getPortalDrawings
      tags: [portal]
      summary: Drawings (current, with revisions)
      responses:
        "200":
          description: Drawings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PortalDocument"

  /portal/drawings/{documentId}:
    get:
      operationId: getPortalDrawing
      tags: [portal]
      summary: A single drawing (logs the view)
      parameters:
        - name: documentId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Drawing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortalDocument"

  /portal/method-statements:
    get:
      operationId: getPortalMethodStatements
      tags: [portal]
      summary: Method statements
      responses:
        "200":
          description: Method statements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PortalDocument"

  /portal/method-statements/{documentId}:
    get:
      operationId: getPortalMethodStatement
      tags: [portal]
      summary: A single method statement (logs the view)
      parameters:
        - name: documentId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Method statement
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortalDocument"

  /portal/permits:
    get:
      operationId: getPortalPermits
      tags: [portal]
      summary: Permits (active, non-archived)
      responses:
        "200":
          description: Permits
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PortalPermit"

  /portal/safety:
    get:
      operationId: getPortalSafety
      tags: [portal]
      summary: Safety documents
      responses:
        "200":
          description: Safety documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PortalDocument"

  /portal/general:
    get:
      operationId: getPortalGeneral
      tags: [portal]
      summary: General documents + notes
      responses:
        "200":
          description: General
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortalGeneral"

  # ---- Team Portal: PM-side invite management + activity reporting ----
  /projects/{projectId}/invites:
    get:
      operationId: listProjectInvites
      tags: [portal]
      summary: List invites for a project (PM)
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Invites
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProjectInvite"
    post:
      operationId: createProjectInvite
      tags: [portal]
      summary: Invite a member to a project (PM)
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInviteRequest"
      responses:
        "201":
          description: Invite created (returns the copyable link)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateInviteResponse"

  /projects/{projectId}/invites/{inviteId}/revoke:
    post:
      operationId: revokeProjectInvite
      tags: [portal]
      summary: Revoke a pending or accepted invite (PM)
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - name: inviteId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /projects/{projectId}/activity:
    get:
      operationId: getProjectActivity
      tags: [portal]
      summary: Team activity feed for a project (PM)
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - name: memberId
          in: query
          required: false
          schema:
            type: string
        - name: section
          in: query
          required: false
          schema:
            type: string
        - name: from
          in: query
          required: false
          schema:
            type: string
        - name: to
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Activity feed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectActivityFeed"

  /projects/{projectId}/activity/summary:
    get:
      operationId: getProjectActivitySummary
      tags: [portal]
      summary: Per-member activity summary for a project (PM)
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Per-member summary
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MemberActivitySummary"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required: [success]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required: [error, message]

    RegisterRequest:
      type: object
      properties:
        companyName:
          type: string
        adminName:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
        companySize:
          type: string
          enum: [1-10, 11-50, 51-200, 201+]
      required: [companyName, adminName, email, password, companySize]

    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required: [email, password]

    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string
      required: [user, token]

    RegisterResponse:
      type: object
      properties:
        requiresVerification:
          type: boolean
        email:
          type: string
          format: email
      required: [requiresVerification, email]

    User:
      type: object
      properties:
        id:
          type: string
        companyId:
          type: string
        email:
          type: string
        name:
          type: string
        role:
          type: string
          enum: [admin, project_manager, site_worker, subcontractor]
        phone:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        lastActiveAt:
          type: string
          format: date-time
          nullable: true
        avatarUrl:
          type: string
          nullable: true
        hasPin:
          type: boolean
      required: [id, companyId, email, name, role, createdAt]

    InviteUserRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        name:
          type: string
        role:
          type: string
          enum: [admin, project_manager, site_worker, subcontractor]
        phone:
          type: string
      required: [email, name, role]

    UpdateUserRequest:
      type: object
      properties:
        name:
          type: string
        role:
          type: string
          enum: [admin, project_manager, site_worker, subcontractor]
        phone:
          type: string

    Project:
      type: object
      properties:
        id:
          type: string
        companyId:
          type: string
        name:
          type: string
        address:
          type: string
