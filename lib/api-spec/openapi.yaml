  /subcontractors/{subcontractorId}/people:
    get:
      operationId: listSubcontractorPeople
      tags: [portal]
      summary: List individual people of a subcontractor firm (PM)
      parameters:
        - name: subcontractorId
          in: path
          required: true
          schema:
            type: string
        - name: projectId
          in: query
          required: false
          description: When set, each person carries per-project portal status.
          schema:
            type: string
        - name: archived
          in: query
          required: false
          description: "true → only archived people; omitted/false → active only"
          schema:
            type: string
      responses:
        "200":
          description: People
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Person"
    post:
      operationId: createSubcontractorPerson
      tags: [portal]
      summary: Add an individual person to a subcontractor firm (PM)
      parameters:
        - name: subcontractorId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePersonRequest"
      responses:
        "201":
          description: Person created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Person"

  /people/{personId}:
    delete:
      operationId: deletePerson
      tags: [portal]
      summary: Remove an individual person (PM) — blocked if on an active project; archived if they have history, else hard-deleted
      parameters:
        - name: personId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Removed (archived or hard-deleted)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RemoveContactResponse"
        "400":
          description: Blocked — on an active project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updatePerson
      tags: [portal]
      summary: Update a person's portal contact visibility and/or job title (PM)
      parameters:
        - name: personId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePersonRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Person"

  /people/{personId}/restore:
    patch:
      operationId: restorePerson
      tags: [portal]
      summary: Un-archive a previously archived person
      parameters:
        - name: personId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Restored
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /people/{personId}/certifications:
    get:
      operationId: listPersonCertifications
      tags: [portal]
      summary: List a person's individual certifications
      parameters:
        - name: personId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Certifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PersonCertification"
    post:
      operationId: createPersonCertification
      tags: [portal]
      summary: Add a certification to a person (auto-archives a prior cert of the same name for this person)
      parameters:
        - name: personId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePersonCertificationRequest"
      responses:
        "201":
          description: Certification added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PersonCertification"

  /people/{personId}/certifications/{certId}:
    delete:
      operationId: deletePersonCertification
      tags: [portal]
      summary: Delete a person's certification
      parameters:
        - name: personId
          in: path
          required: true
          schema:
            type: string
        - name: certId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /people:
    get:
      operationId: listAllPeople
      tags: [portal]
      summary: Flat, tenant-scoped list of every person (subcontractor-linked + in-house) for person-first pickers
      parameters:
        - name: projectId
          in: query
          required: false
          description: When set, each person carries onProject (already added to this project).
          schema:
            type: string
      responses:
        "200":
          description: People
          content:
            application/json:
              schema:
                type: array
                items:
                  allOf:
                    - $ref: "#/components/schemas/Person"
                    - type: object
                      properties:
                        onProject:
                          type: boolean

  /projects/{projectId}/in-house-people:
    get:
      operationId: listInHousePeople
      tags: [portal]
      summary: In-house people (portal-only) with per-project portal status (PM)
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - name: archived
          in: query
          required: false
          description: "true → only archived people; omitted/false → active only"
          schema:
            type: string
      responses:
        "200":
          description: In-house people
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Person"
    post:
      operationId: createInHousePerson
      tags: [portal]
      summary: Add an in-house person (portal-only) (PM)
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePersonRequest"
      responses:
        "201":
          description: Person created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Person"

  /projects/{projectId}/portal-invites:
    post:
      operationId: createPortalInvite
      tags: [portal]
      summary: Invite an individual person to a project's portal (PM)
      description: >
        Single invite path for everyone (subcontractor or in-house). Always
        portal-only: creates or rotates a pending invite and returns a copyable
        link. The person becomes a portalOnly account when they accept it.
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PortalInviteRequest"
      responses:
        "201":
          description: Invite created or member provisioned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortalInviteResponse"

  /projects/{projectId}/invites/{inviteId}/revoke:
    post:
      operationId: revokeProjectInvite
      tags: [portal]
      summary: Revoke a pending or accepted invite (PM)
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - name: inviteId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /projects/{projectId}/portal-invites/{inviteId}/resend:
    post:
      operationId: resendPortalInvite
      tags: [portal]
      summary: Re-send a pending invite's email (PM, rate-limited 1/5min)
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - name: inviteId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Resent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResendInviteResponse"
        "429":
          description: Rate limited (resent too recently)

  /projects/{projectId}/activity:
    get:
      operationId: getProjectActivity
      tags: [portal]
      summary: Team activity feed for a project (PM)
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - name: memberId
          in: query
          required: false
          schema:
            type: string
        - name: section
          in: query
          required: false
          schema:
            type: string
        - name: from
          in: query
          required: false
          schema:
            type: string
        - name: to
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Activity feed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectActivityFeed"

  /projects/{projectId}/activity/summary:
    get:
      operationId: getProjectActivitySummary
      tags: [portal]
      summary: Per-member activity summary for a project (PM)
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Per-member summary
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MemberActivitySummary"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required: [success]

    RemoveMemberResponse:
      type: object
      properties:
        success:
          type: boolean
        removedName:
          type: string
      required: [success]

    RemoveCompanyMembersResponse:
      type: object
      properties:
        success:
          type: boolean
        removedNames:
          type: array
          items:
            type: string
      required: [success]

    RemoveContactResponse:
      type: object
      properties:
        success:
          type: boolean
        archived:
          type: boolean
          description: true if the contact was archived (has history), false if hard-deleted (zero footprint)
      required: [success]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required: [error, message]

    RegisterRequest:
      type: object
      properties:
        companyName:
          type: string
        adminName:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
        companySize:
          type: string
          enum: [1-10, 11-50, 51-200, 201+]
      required: [companyName, adminName, email, password, companySize]

    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required: [email, password]

    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string
      required: [user, token]

    RegisterResponse:
      type: object
      properties:
        requiresVerification:
          type: boolean
        email:
          type: string
          format: email
      required: [requiresVerification, email]

    User:
      type: object
      properties:
        id:
          type: string
        companyId:
          type: string
        email:
          type: string
        name:
          type: string
        role:
          type: string
          enum: [admin, project_manager, site_worker, subcontractor]
        phone:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        lastActiveAt:
          type: string
          format: date-time
          nullable: true
        avatarUrl:
          type: string
          nullable: true
        hasPin:
          type: boolean
      required: [id, companyId, email, name, role, createdAt]

    InviteUserRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        name:
          type: string
        role:
          type: string
          enum: [admin, project_manager, site_worker, subcontractor]
        phone:
          type: string
      required: [email, name, role]

    UpdateUserRequest:
      type: object
      properties:
        name:
          type: string
        role:
          type: string
          enum: [admin, project_manager, site_worker, subcontractor]
        phone:
          type: string

    Project:
      type: object
      properties:
        id:
          type: string
        companyId:
          type: string
        name:
          type: string
        address:
          type: string
        status:
          type: string
          enum: [active, on_hold, complete]
        startDate:
          type: string
          format: date
        targetEndDate:
          type: string
          format: date
          nullable: true
        createdAt:
          type: string
          format: date-time
        memberCount:
          type: integer
        alertCount:
          type: integer
        progressPercent:
          type: integer
      required: [id, companyId, name, address, status, startDate, createdAt, memberCount, alertCount, progressPercent]

    ProjectDetail:
      allOf:
        - $ref: "#/components/schemas/Project"
        - type: object
          properties:
            recentActivity:
              type: array
              items:
                $ref: "#/components/schemas/ActivityItem"
          required: [recentActivity]

    CreateProjectRequest:
      type: object
      properties:
        name:
          type: string
        address:
          type: string
        startDate:
          type: string
          format: date
        targetEndDate:
          type: string
          format: date
      required: [name, address, startDate]

    UpdateProjectRequest:
      type: object
      properties:
        name:
          type: string
        address:
          type: string
        status:
          type: string
          enum: [active, on_hold, complete]
        targetEndDate:
          type: string
          format: date

    ActivityItem:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
        description:
          type: string
        userId:
          type: string
          nullable: true
        userName:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, type, description, createdAt]

    Document:
      type: object
      properties:
        id:
          type: string
        projectId:
          type: string
        uploadedBy:
          type: string
        uploaderName:
          type: string
        name:
          type: string
        type:
          type: string
          enum: [drawing, method_statement, permit, safety, general]
        version:
          type: integer
        revision:
          type: string
          nullable: true
        fileUrl:
          type: string
        fileSize:
          type: integer
        previousVersionId:
          type: string
          nullable: true
        status:
          type: string
          enum: [current, superseded]
        requiresAcknowledgment:
          type: boolean
        publicAccess:
          type: boolean
        createdAt:
          type: string
          format: date-time
        distributionSummary:
          $ref: "#/components/schemas/DistributionSummary"
        myDistributionStatus:
          type: string
          enum: [pending, viewed, acknowledged]
          nullable: true
      required: [id, projectId, uploadedBy, uploaderName, name, type, version, fileUrl, fileSize, status, requiresAcknowledgment, publicAccess, createdAt, distributionSummary]

    DocumentDetail:
      allOf:
        - $ref: "#/components/schemas/Document"
        - type: object
          properties:
            distributions:
              type: array
              items:
                $ref: "#/components/schemas/Distribution"
          required: [distributions]

    DistributionSummary:
      type: object
      properties:
        total:
          type: integer
        pending:
          type: integer
        viewed:
          type: integer
        acknowledged:
          type: integer
      required: [total, pending, viewed, acknowledged]

    UploadDocumentRequest:
      type: object
      properties:
        name:
          type: string
        type:
          type: string
          enum: [drawing, method_statement, permit, safety, general]
        fileUrl:
          type: string
        fileSize:
          type: integer
        requiresAcknowledgment:
          type: boolean
        publicAccess:
          type: boolean
        distributeToUserIds:
          type: array
          items:
            type: string
        supersededDocumentId:
          type: string
          nullable: true
        revision:
          type: string
          nullable: true
      required: [name, type, fileUrl, fileSize]

    AcknowledgeRequest:
      type: object
      properties:
        pin:
          type: string
          nullable: true
        latitude:
          type: number
          nullable: true
        longitude:
          type: number
          nullable: true
      required: []

    DistributeRequest:
      type: object
      properties:
        userIds:
          type: array
          items:
            type: string
      required: [userIds]

    Distribution:
      type: object
      properties:
        id:
          type: string
        documentId:
          type: string
        userId:
          type: string
        userName:
          type: string
        userRole:
          type: string
        status:
          type: string
          enum: [pending, viewed, acknowledged]
        distributedAt:
          type: string
          format: date-time
        viewedAt:
          type: string
          format: date-time
          nullable: true
        acknowledgedAt:
          type: string
          format: date-time
          nullable: true
        removedFromProject:
          type: boolean
      required: [id, documentId, userId, userName, userRole, status, distributedAt]

    AuditLogEntry:
      type: object
      properties:
        id:
          type: string
        documentId:
          type: string
        documentVersion:
          type: integer
        userId:
          type: string
        userName:
          type: string
        userRole:
          type: string
        action:
          type: string
        signedOffWithPin:
          type: boolean
        ipAddress:
          type: string
          nullable: true
        userAgent:
          type: string
          nullable: true
        removedFromProject:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required: [id, documentId, documentVersion, userId, userName, userRole, action, signedOffWithPin, createdAt]

    ProjectMember:
      type: object
      properties:
        id:
          type: string
        projectId:
          type: string
        userId:
          type: string
          nullable: true
        subcontractorId:
          type: string
          nullable: true
        personId:
          type: string
          nullable: true
        name:
          type: string
        contactName:
          type: string
          nullable: true
          description: Legacy company-row field — the firm's primary contact name (company rows only; superseded by personId rows post-backfill).
        companyName:
          type: string
          nullable: true
          description: Set when this card belongs to a subcontractor-linked person or company row — "Self-employed" is shown client-side in place of this when contactType is self_employed.
        contactType:
          type: string
          nullable: true
          enum: [subcontractor, merchant, supplier, professional, self_employed, other]
        roleTitle:
          type: string
          nullable: true
        isPrimaryContact:
          type: boolean
        email:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        trades:
          type: array
          items:
            type: string
        avatarUrl:
          type: string
          nullable: true
        pliCertUrl:
          type: string
          nullable: true
        pliExpiryDate:
          type: string
          format: date
          nullable: true
        role:
          type: string
          enum: [manager, worker, subcontractor]
        complianceStatus:
          type: string
          enum: [ok, warning, hold, none]
        scheduledDays:
          type: array
          items:
            type: string
        siteStartTime:
          type: string
          nullable: true
        siteEndTime:
          type: string
          nullable: true
        canLogIssues:
          type: boolean
          description: Portal write permission — can log a site issue. Default true.
        canUpdatePlantMaterials:
          type: boolean
          description: Portal write permission — can update Plant & Materials item status/location/notes. Default false.
        canEditDailyReport:
          type: boolean
          description: Portal write permission — can author/amend the project's daily site report. Default false.
        addedAt:
          type: string
          format: date-time
      required: [id, projectId, name, role, complianceStatus, addedAt]

    UpdateMemberPermissionsRequest:
      type: object
      properties:
        canLogIssues:
          type: boolean
        canUpdatePlantMaterials:
          type: boolean
        canEditDailyReport:
          type: boolean

    AddMemberRequest:
      type: object
      properties:
        userId:
          type: string
          nullable: true
        subcontractorId:
          type: string
          nullable: true
        role:
          type: string
          enum: [manager, worker, subcontractor]
      required: [role]

    AddProjectMemberPersonRequest:
      type: object
      properties:
        personId:
          type: string
        role:
          type: string
          enum: [manager, worker, subcontractor]
      required: [personId]

    Subcontractor:
      type: object
      properties:
        id:
          type: string
        companyId:
          type: string
        companyName:
          type: string
        contactName:
          type: string
          description: Computed "First Last" — kept for backward compatibility. Use contactFirstName/contactLastName for editing.
        contactFirstName:
          type: string
          nullable: true
        contactLastName:
          type: string
          nullable: true
        contactEmail:
          type: string
        contactPhone:
          type: string
          nullable: true
        contactType:
          type: string
          enum: [subcontractor, merchant, supplier, professional, self_employed, other]
        trades:
          type: array
          items:
            type: string
        reliabilityRating:
          type: number
          nullable: true
        paymentHold:
          type: boolean
        insuranceStatus:
          type: string
          enum: [valid, expiring_soon, expired, none]
        archivedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, companyId, companyName, contactName, contactEmail, trades, paymentHold, insuranceStatus, createdAt]

    SubcontractorDetail:
      allOf:
        - $ref: "#/components/schemas/Subcontractor"
        - type: object
          properties:
            insuranceRecords:
              type: array
              items:
                $ref: "#/components/schemas/InsuranceRecord"
            assignedProjects:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: string
                  name:
                    type: string
                required: [id, name]
          required: [insuranceRecords, assignedProjects]

    CreateSubcontractorRequest:
      type: object
      properties:
        companyName:
          type: string
        contactFirstName:
          type: string
          minLength: 2
        contactLastName:
          type: string
          minLength: 2
        contactEmail:
          type: string
          format: email
        contactPhone:
          type: string
        contactType:
          type: string
          description: "'self_employed' means the person IS the entity — companyName is optional (server defaults it to the contact's name if omitted)."
          enum: [subcontractor, merchant, supplier, professional, self_employed, other]
        trades:
          type: array
          items:
            type: string
        notes:
          type: string
      required: [contactFirstName, contactLastName, contactEmail, trades]

    UpdateSubcontractorRequest:
      type: object
      properties:
        companyName:
          type: string
        contactFirstName:
          type: string
          minLength: 2
        contactLastName:
          type: string
          minLength: 2
        contactEmail:
          type: string
        contactPhone:
          type: string
        contactType:
          type: string
          enum: [subcontractor, merchant, supplier, professional, self_employed, other]
        trades:
          type: array
          items:
            type: string
        notes:
          type: string
        reliabilityRating:
          type: number
        paymentHold:
          type: boolean

    InsuranceRecord:
      type: object
      properties:
        id:
          type: string
        subcontractorId:
          type: string
        type:
          type: string
          enum: [public_liability, employers, professional]
        certificateUrl:
          type: string
        expiryDate:
          type: string
          format: date
        status:
          type: string
          enum: [valid, expiring_soon, expired]
        assignedToUserId:
          type: string
          nullable: true
        assignedToUserName:
          type: string
          nullable: true
        dueDate:
          type: string
          format: date
          nullable: true
        overdue:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required: [id, subcontractorId, type, certificateUrl, expiryDate, status, overdue, createdAt]

    AddInsuranceRequest:
      type: object
      properties:
        type:
          type: string
          enum: [public_liability, employers, professional]
        certificateUrl:
          type: string
        expiryDate:
          type: string
          format: date
        assignedToUserId:
