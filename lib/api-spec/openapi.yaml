openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: SiteSort API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: projects
    description: Project management
  - name: documents
    description: Document management
  - name: distributions
    description: Document distributions
  - name: audit
    description: Immutable acknowledgment audit trail
  - name: team
    description: Team management
  - name: subcontractors
    description: Subcontractor management
  - name: insurance
    description: Insurance records
  - name: subcontractor-documents
    description: Versioned documents on a subcontractor/merchant contact
  - name: permits
    description: Permit management
  - name: photos
    description: Photo compliance log
  - name: compliance
    description: Compliance overview
  - name: notifications
    description: Notification management
  - name: users
    description: User management
  - name: qr
    description: QR code generation
  - name: portal
    description: Team Portal — member onboarding, sections, and PM activity
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new company and admin user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Registered — verification email sent, no session issued yet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout current user
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List all projects for the company
      responses:
        "200":
          description: List of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
    post:
      operationId: createProject
      tags: [projects]
      summary: Create a new project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectRequest"
      responses:
        "201":
          description: Project created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  /projects/{projectId}:
    get:
      operationId: getProject
      tags: [projects]
      summary: Get a project by ID
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Project details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateProject
      tags: [projects]
      summary: Update a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectRequest"
      responses:
        "200":
          description: Updated project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  /projects/{projectId}/documents:
    get:
      operationId: listDocuments
      tags: [documents]
      summary: List documents for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Document"
    post:
      operationId: uploadDocument
      tags: [documents]
      summary: Upload a new document to a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadDocumentRequest"
      responses:
        "201":
          description: Document uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"

  /documents/{documentId}:
    get:
      operationId: getDocument
      tags: [documents]
      summary: Get a document by ID
      parameters:
        - name: documentId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Document details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /documents/{documentId}/acknowledge:
    post:
      operationId: acknowledgeDocument
      tags: [documents]
      summary: Acknowledge a document (sign-off)
      parameters:
        - name: documentId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AcknowledgeRequest"
      responses:
        "200":
          description: Acknowledgment recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /documents/{documentId}/distribute:
    post:
      operationId: distributeDocument
      tags: [distributions]
      summary: Distribute a document to team members
      parameters:
        - name: documentId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DistributeRequest"
      responses:
        "200":
          description: Distribution created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /documents/{documentId}/distributions:
    get:
      operationId: getDocumentDistributions
      tags: [distributions]
      summary: Get distribution status for a document
      parameters:
        - name: documentId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Distribution records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Distribution"

  /documents/{documentId}/audit-log:
    get:
      operationId: getDocumentAuditLog
      tags: [audit]
      summary: Get the immutable acknowledgment audit trail for a document
      description: Read-only, append-only history of sign-offs. Restricted to admins and project managers.
      parameters:
        - name: documentId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Audit trail entries (newest first)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AuditLogEntry"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /projects/{projectId}/members:
    get:
      operationId: listProjectMembers
      tags: [team]
      summary: List members of a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProjectMember"
    post:
      operationId: addProjectMember
      tags: [team]
      summary: Add a member to a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddMemberRequest"
      responses:
        "201":
          description: Member added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectMember"

  /projects/{projectId}/members/{memberId}:
    delete:
      operationId: removeProjectMember
      tags: [team]
      summary: Remove a member from a project (manager-gated). Revokes portal access and cancels any pending invite; past activity/distribution/sign-off history is retained.
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - name: memberId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Member removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RemoveMemberResponse"

  /projects/{projectId}/members/{memberId}/permissions:
    patch:
      operationId: updateMemberPermissions
      tags: [team]
      summary: Update a portal member's write permissions (manager-gated)
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - name: memberId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMemberPermissionsRequest"
      responses:
        "200":
          description: Permissions updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /projects/{projectId}/members/company/{subcontractorId}:
    delete:
      operationId: removeProjectMemberCompany
      tags: [team]
      summary: Remove a subcontractor firm and all its people from a project in one action (manager-gated)
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - name: subcontractorId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Company and its people removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RemoveCompanyMembersResponse"

  /projects/{projectId}/members/person:
    post:
      operationId: addProjectMemberPerson
      tags: [team]
      summary: Add a specific person (subcontractor employee, self-employed contact, or in-house) to a project's team (manager-gated)
      description: >
        Creates the person's project_members row immediately (personId set) —
        no portal acceptance required. Portal invite is a separate, optional
        follow-on action. Reuses the existing dashboard-account link if the
        person already has one.
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddProjectMemberPersonRequest"
      responses:
        "201":
          description: Person added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectMember"
        "409":
          description: Already a member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /subcontractors:
    get:
      operationId: listSubcontractors
      tags: [subcontractors]
      summary: List all subcontractors for the company
      parameters:
        - name: archived
          in: query
          required: false
          description: "true → only archived contacts; omitted/false → active only"
          schema:
            type: string
      responses:
        "200":
          description: List of subcontractors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Subcontractor"
    post:
      operationId: createSubcontractor
      tags: [subcontractors]
      summary: Add a new subcontractor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSubcontractorRequest"
      responses:
        "201":
          description: Subcontractor created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subcontractor"

  /subcontractors/{subcontractorId}:
    get:
      operationId: getSubcontractor
      tags: [subcontractors]
      summary: Get a subcontractor by ID
      parameters:
        - name: subcontractorId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Subcontractor details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubcontractorDetail"
    patch:
      operationId: updateSubcontractor
      tags: [subcontractors]
      summary: Update a subcontractor
      parameters:
        - name: subcontractorId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSubcontractorRequest"
      responses:
        "200":
          description: Updated subcontractor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subcontractor"
    delete:
      operationId: deleteSubcontractor
      tags: [subcontractors]
      summary: Remove a subcontractor from the directory (blocked if on an active project; archived if it has history, else hard-deleted)
      parameters:
        - name: subcontractorId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Removed (archived or hard-deleted)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RemoveContactResponse"
        "400":
          description: Blocked — on an active project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /subcontractors/{subcontractorId}/restore:
    patch:
      operationId: restoreSubcontractor
      tags: [subcontractors]
      summary: Un-archive a previously archived subcontractor
      parameters:
        - name: subcontractorId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Restored
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /subcontractors/{subcontractorId}/insurance:
    post:
      operationId: addInsuranceRecord
      tags: [insurance]
      summary: Add an insurance record for a subcontractor
      parameters:
        - name: subcontractorId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddInsuranceRequest"
      responses:
        "201":
          description: Insurance record added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InsuranceRecord"

  /subcontractors/{subcontractorId}/insurance/{recordId}:
    patch:
      operationId: updateInsuranceRecord
      tags: [insurance]
      summary: Update an insurance record (reassign, due date, expiry, certificate)
      parameters:
        - name: subcontractorId
          in: path
          required: true
          schema:
            type: string
        - name: recordId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateInsuranceRequest"
      responses:
        "200":
          description: Updated insurance record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InsuranceRecord"

  /subcontractors/{subcontractorId}/documents:
    get:
      operationId: listSubcontractorDocuments
      tags: [subcontractor-documents]
      summary: List a subcontractor's documents (base docs, plus a project's extras if projectId given)
      parameters:
        - name: subcontractorId
          in: path
          required: true
          schema:
            type: string
        - name: projectId
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of subcontractor documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SubcontractorDocument"
    post:
      operationId: createSubcontractorDocument
      tags: [subcontractor-documents]
      summary: Upload a document for a subcontractor (auto-supersedes a same-name doc in the same scope)
      parameters:
        - name: subcontractorId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSubcontractorDocumentRequest"
      responses:
        "201":
          description: Document uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubcontractorDocument"

  /subcontractors/{subcontractorId}/documents/{documentId}:
    patch:
      operationId: updateSubcontractorDocument
      tags: [subcontractor-documents]
      summary: Update a subcontractor document (name, type, or status)
      parameters:
        - name: subcontractorId
          in: path
          required: true
          schema:
            type: string
        - name: documentId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSubcontractorDocumentRequest"
      responses:
        "200":
          description: Updated document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubcontractorDocument"

  /subcontractors/{subcontractorId}/documents/{documentId}/revisions:
    get:
      operationId: listSubcontractorDocumentRevisions
      tags: [subcontractor-documents]
      summary: Walk the supersede chain for a subcontractor document, newest first
      parameters:
        - name: subcontractorId
          in: path
          required: true
          schema:
            type: string
        - name: documentId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Revision chain, newest first
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SubcontractorDocument"

  /projects/{projectId}/plant-items:
    get:
      operationId: listPlantItems
      tags: [plant-items]
      summary: List Plant & Materials items for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - name: category
          in: query
          required: false
          schema:
            type: string
            enum: [plant_equipment, materials]
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [on_site, on_order, off_hired, depleted]
      responses:
        "200":
          description: List of plant/material items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PlantItem"
    post:
      operationId: createPlantItem
      tags: [plant-items]
      summary: Create a Plant & Materials item (manager/site-worker gated)
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePlantItemRequest"
      responses:
        "201":
          description: Item created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlantItem"

  /projects/{projectId}/plant-items/{itemId}:
    patch:
      operationId: updatePlantItem
      tags: [plant-items]
      summary: Update a Plant & Materials item (manager/site-worker gated)
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - name: itemId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePlantItemRequest"
      responses:
        "200":
          description: Item updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlantItem"
    delete:
      operationId: deletePlantItem
      tags: [plant-items]
      summary: Delete a Plant & Materials item (manager-gated only)
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - name: itemId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Item deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /projects/{projectId}/plant-items/{itemId}/attachments:
    get:
      operationId: listPlantItemAttachments
      tags: [plant-items]
      summary: List a plant/material item's documents & photos
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - name: itemId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Attachments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PlantItemAttachment"
    post:
      operationId: createPlantItemAttachment
      tags: [plant-items]
      summary: Attach a document/photo to a plant/material item (file already uploaded via /api/upload)
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - name: itemId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePlantItemAttachmentRequest"
      responses:
        "201":
          description: Attachment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlantItemAttachment"

  /projects/{projectId}/plant-items/{itemId}/distribute:
    post:
      operationId: distributePlantItem
      tags: [plant-items]
      summary: Allocate a plant/material item to one or more team members (pending/viewed/acknowledged tracking)
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - name: itemId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                userIds:
                  type: array
                  items:
                    type: string
              required: [userIds]
      responses:
        "200":
          description: Item distributed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /projects/{projectId}/plant-items/{itemId}/distributions:
    get:
      operationId: listPlantItemDistributions
      tags: [plant-items]
      summary: List a plant/material item's allocation tracking (pending/viewed/acknowledged per recipient)
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - name: itemId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Distributions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PlantItemDistribution"

  /portal/plant-materials:
    get:
      operationId: getPortalPlantMaterials
      tags: [portal]
      summary: List Plant & Materials items shared with this portal member
      responses:
        "200":
          description: Visible plant/material items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PortalPlantItem"

  /portal/plant-materials/{itemId}:
    get:
      operationId: getPortalPlantMaterialItem
