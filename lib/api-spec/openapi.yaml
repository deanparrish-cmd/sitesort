        description:
          type: string
        startDate:
          type: string
        expiryDate:
          type: string
        status:
          type: string
        documentUrl:
          type: string
        unseen:
          type: boolean
        sharedAt:
          type: string
      required: [id, type, description, expiryDate, status]

    PortalEvent:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        eventDate:
          type: string
        note:
          type: string
        scope:
          type: string
      required: [id, title, eventDate, scope]

    PortalBoardPin:
      type: object
      description: A pinned board item (document, photo, or permit) — polymorphic.
      properties:
        itemType: { type: string }
        id: { type: string }
        name: { type: string }
        type: { type: string }
        version: { type: integer }
        superseded: { type: boolean }
        fileUrl: { type: string }
        referenceNumber: { type: string }
        category: { type: string }
        description: { type: string, nullable: true }
        photoUrl: { type: string, nullable: true }
        expiryDate: { type: string }
        status: { type: string }
      required: [itemType, id]

    PortalSiteBoard:
      type: object
      description: Full site board — same source as the public scanned view + the board QR token.
      properties:
        project:
          type: object
          properties:
            id: { type: string }
            name: { type: string }
            address: { type: string }
            status: { type: string }
            startDate: { type: string, nullable: true }
            targetEndDate: { type: string, nullable: true }
            trades: { type: array, items: { type: string } }
          required: [id, name, address, status, trades]
        siteManager:
          type: object
          nullable: true
          properties:
            name: { type: string }
            email: { type: string }
            phone: { type: string, nullable: true }
        teamSize: { type: integer }
        permits:
          type: array
          items:
            type: object
            properties:
              id: { type: string }
              type: { type: string }
              description: { type: string }
              expiryDate: { type: string }
            required: [id, type, expiryDate]
        documents:
          type: array
          items:
            type: object
            properties:
              id: { type: string }
              name: { type: string }
              type: { type: string }
              version: { type: integer }
              uploadedAt: { type: string }
            required: [id, name, type]
        pinnedItems:
          type: array
          items:
            $ref: "#/components/schemas/PortalBoardPin"
        upcomingEvents:
          type: array
          items:
            $ref: "#/components/schemas/PortalEvent"
        qrToken:
          type: string
          nullable: true
      required: [project, teamSize, permits, documents, pinnedItems, upcomingEvents]

    PortalHs:
      type: object
      properties:
        methodStatements:
          type: array
          items:
            $ref: "#/components/schemas/PortalDocument"
        safety:
          type: array
          items:
            $ref: "#/components/schemas/PortalDocument"
        permits:
          type: array
          items:
            $ref: "#/components/schemas/PortalPermit"
      required: [methodStatements, safety, permits]

    PortalShared:
      type: object
      properties:
        documents:
          type: array
          items:
            $ref: "#/components/schemas/PortalDocument"
        photos:
          type: array
          items:
            $ref: "#/components/schemas/PortalIssue"
        permits:
          type: array
          items:
            $ref: "#/components/schemas/PortalPermit"
      required: [documents, photos, permits]

    PortalGeneral:
      type: object
      properties:
        documents:
          type: array
          items:
            $ref: "#/components/schemas/PortalDocument"
        notes:
          type: array
          items:
            $ref: "#/components/schemas/PortalNote"
      required: [documents, notes]

    PortalUnseen:
      type: object
      properties:
        counts:
          type: object
          additionalProperties:
            type: integer
          description: Unseen item count keyed by portal section key (e.g. drawings, site-issues, shared).
        total:
          type: integer
      required: [counts, total]

    PortalPushKey:
      type: object
      properties:
        publicKey:
          type: string
          nullable: true
      required: [publicKey]

    PortalPushSubscribeRequest:
      type: object
      properties:
        endpoint:
          type: string
        keys:
          type: object
          properties:
            p256dh:
              type: string
            auth:
              type: string
          required: [p256dh, auth]
        userAgent:
          type: string
      required: [endpoint, keys]

    PortalPushUnsubscribeRequest:
      type: object
      properties:
        endpoint:
          type: string
      required: [endpoint]

    ProjectInvite:
      type: object
      properties:
        id:
          type: string
        projectId:
          type: string
        email:
          type: string
        name:
          type: string
        role:
          type: string
        status:
          type: string
        expiresAt:
          type: string
        acceptedUserId:
          type: string
        acceptedAt:
          type: string
        revokedAt:
          type: string
        createdAt:
          type: string
      required: [id, projectId, email, name, role, status, expiresAt, createdAt]

    CreateInviteRequest:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum: [worker, manager, subcontractor]
      required: [name, email]

    CreateInviteResponse:
      type: object
      properties:
        invite:
          $ref: "#/components/schemas/ProjectInvite"
        inviteUrl:
          type: string
      required: [invite, inviteUrl]

    PortalStatus:
      type: object
      description: A person's portal state for one project.
      properties:
        status:
          type: string
          enum: [not_invited, invited, member]
        role:
          type: string
        inviteId:
          type: string
        lastActiveAt:
          type: string
        emailStatus:
          type: string
          enum: [sent, failed]
          description: Delivery state of the invite email (absent = never attempted).
        emailLastSentAt:
          type: string
          description: ISO timestamp of the last invite-email send attempt.
        memberId:
          type: string
          description: project_members.id — present when status is "member"; PATCH .../members/{memberId}/permissions targets this id.
        canLogIssues:
          type: boolean
        canUpdatePlantMaterials:
          type: boolean
      required: [status]

    Person:
      type: object
      description: An individual person (subcontractor person when subcontractorId set, else in-house).
      properties:
        id:
          type: string
        subcontractorId:
          type: string
        userId:
          type: string
        name:
          type: string
          description: Computed "First Last" — kept for backward compatibility. Use firstName/lastName for editing.
        firstName:
          type: string
          nullable: true
        lastName:
          type: string
          nullable: true
        email:
          type: string
        phone:
          type: string
        roleTitle:
          type: string
        showContactInPortal:
          type: boolean
          description: Whether email/phone show on this person's portal Team row (absent = role-based default).
        archivedAt:
          type: string
          format: date-time
        kind:
          type: string
          enum: [subcontractor, in_house]
        isPrimaryContact:
          type: boolean
          description: True for the one auto-created row mirroring a subcontractor's own default contact fields.
        companyName:
          type: string
          nullable: true
          description: Populated when subcontractorId is set — "Self-employed" is shown client-side in place of this when the firm's contactType is self_employed.
        contactType:
          type: string
          nullable: true
          enum: [subcontractor, merchant, supplier, professional, self_employed, other]
        trades:
          type: array
          items:
            type: string
        portal:
          $ref: "#/components/schemas/PortalStatus"
      required: [id, name, email, kind]

    CreatePersonRequest:
      type: object
      properties:
        firstName:
          type: string
          minLength: 2
        lastName:
          type: string
          minLength: 2
        email:
          type: string
          format: email
        phone:
          type: string
        roleTitle:
          type: string
      required: [firstName, lastName, email]

    UpdatePersonRequest:
      type: object
      description: Partial update; omit a field to leave it unchanged. showContactInPortal null = reset to role default.
      properties:
        firstName:
          type: string
          minLength: 2
        lastName:
          type: string
          minLength: 2
        showContactInPortal:
          type: boolean
          nullable: true
        roleTitle:
          type: string
          nullable: true

    PersonCertification:
      type: object
      description: An individual certification/ticket held by a person (CSCS, SSSTS/SMSTS, gas safe, plant tickets, etc.) — distinct from company-level PLI/insurance.
      properties:
        id:
          type: string
        personId:
          type: string
        name:
          type: string
        certNumber:
          type: string
          nullable: true
        expiryDate:
          type: string
          format: date
        status:
          type: string
          enum: [valid, expiring_soon, expired]
        documentUrl:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, personId, name, expiryDate, status, createdAt]

    CreatePersonCertificationRequest:
      type: object
      properties:
        name:
          type: string
        certNumber:
          type: string
        expiryDate:
          type: string
        documentUrl:
          type: string
      required: [name, expiryDate]

    PortalInviteRequest:
      type: object
      description: Invite an individual person (subcontractor or in-house) to the portal.
      properties:
        personId:
          type: string
        role:
          type: string
          enum: [worker, manager, subcontractor]
      required: [personId]

    PortalInviteResponse:
      type: object
      properties:
        status:
          type: string
          enum: [invited, member]
        person:
          $ref: "#/components/schemas/Person"
        inviteUrl:
          type: string
          nullable: true
        emailStatus:
          type: string
          enum: [sent, failed]
          description: Delivery state of the invite email just sent (absent when provisioning an existing member).
      required: [status, person]

    ResendInviteResponse:
      type: object
      properties:
        success:
          type: boolean
        emailStatus:
          type: string
          enum: [sent, failed]
        inviteUrl:
          type: string
      required: [success, emailStatus]

    ActivityEntry:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        memberName:
          type: string
        section:
          type: string
        sectionLabel:
          type: string
        action:
          type: string
        itemType:
          type: string
        itemId:
          type: string
        removedFromProject:
          type: boolean
        createdAt:
          type: string
      required: [id, userId, memberName, section, sectionLabel, action, createdAt]

    ProjectActivityFeed:
      type: object
      properties:
        entries:
          type: array
          items:
            $ref: "#/components/schemas/ActivityEntry"
        total:
          type: integer
      required: [entries, total]

    SectionCount:
      type: object
      properties:
        section:
          type: string
        sectionLabel:
          type: string
        count:
          type: integer
      required: [section, sectionLabel, count]

    MemberActivitySummary:
      type: object
      properties:
        userId:
          type: string
        memberName:
          type: string
        role:
          type: string
        lastActiveAt:
          type: string
        totalViews:
          type: integer
        topSections:
          type: array
          items:
            $ref: "#/components/schemas/SectionCount"
      required: [userId, memberName, role, totalViews, topSections]
